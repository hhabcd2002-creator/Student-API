<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0062ff; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 800px; text-align: center; }
        .hidden { display: none !important; }
        h1, h2 { color: var(--blue); }
        
        /* Login UI */
        .login-input { padding: 12px; width: 80%; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; outline: none; text-align: center; font-size: 1rem; }
        
        /* Buttons */
        .btn { background: var(--blue); color: white; border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; margin: 5px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 98, 255, 0.3); }
        .btn-back { background: #64748b; margin-top: 20px; }

        /* Student Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .student-btn { background: white; border: 2px solid #e2e8f0; padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .student-btn:hover { border-color: var(--blue); background: #f0f7ff; color: var(--blue); }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 25px; border-radius: 12px; overflow: hidden; }
        th { background: var(--blue); color: white; padding: 15px; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 500; }
        
        #loading-text { color: var(--blue); font-weight: bold; margin: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <div id="login-screen">
            <h1><i class="fas fa-lock"></i></h1>
            <h2>Security Access</h2>
            <input type="password" id="mainPass" class="login-input" placeholder="Enter Password">
            <br>
            <button class="btn" onclick="checkLogin()">Enter Dashboard</button>
        </div>

        <div id="list-screen" class="hidden">
            <h1><i class="fas fa-user-graduate"></i></h1>
            <h2>ကျောင်းသားရွေးချယ်ပါ</h2>
            <div id="loading-text">Google Sheets မှ ဒေတာများကို ဖတ်နေသည်...</div>
            <div id="studentGrid" class="grid"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 id="currentName" style="margin-bottom: 5px;"></h2>
            <p style="color: #64748b; margin-bottom: 20px;">Individual Performance Report</p>
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Exam Serial No</th>
                        <th>Marks</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            
            <div style="height: 350px; margin-top: 30px;">
                <canvas id="performanceChart"></canvas>
            </div>
            
            <button class="btn btn-back" onclick="showList()">နောက်သို့</button>
        </div>
    </div>

    <script>
        // ထည့်သွင်းပေးထားသော Google Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAHQd2JDsF2iEUis7YdLHDhKRY1pO03q4sDC8B-AgWPR5nHqu9DME_NTgVi3RqEWIVjw/exec';
        
        let allStudents = [];
        let myChart = null;

        function checkLogin() {
            const pass = document.getElementById('mainPass').value;
            if (pass === 'math2026') {
                switchScreen('list-screen');
                loadData();
            } else {
                alert('စကားဝှက် မှားယွင်းနေပါသည်။');
            }
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const rawData = await response.json();
                
                // ဒေတာများကို နာမည်အလိုက် စုစည်းခြင်း
                const grouped = rawData.reduce((acc, obj) => {
                    if (!acc[obj.studentName]) acc[obj.studentName] = [];
                    acc[obj.studentName].push(obj);
                    return acc;
                }, {});

                allStudents = Object.keys(grouped).map(name => ({
                    name: name,
                    exams: grouped[name]
                }));

                renderStudentButtons();
                document.getElementById('loading-text').classList.add('hidden');
            } catch (error) {
                document.getElementById('loading-text').innerText = "ဒေတာဖတ်ရာတွင် အမှားအယွင်းရှိနေပါသည်။";
                console.error(error);
            }
        }

        function renderStudentButtons() {
            const grid = document.getElementById('studentGrid');
            grid.innerHTML = '';
            allStudents.forEach((student, index) => {
                const btn = document.createElement('div');
                btn.className = 'student-btn';
                btn.innerHTML = `<i class="fas fa-user-circle fa-2x"></i><br><br>${student.name}`;
                btn.onclick = () => showResult(index);
                grid.appendChild(btn);
            });
        }

        function showResult(index) {
            const student = allStudents[index];
            switchScreen('result-screen');
            document.getElementById('currentName').innerText = student.name;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            student.exams.forEach(ex => {
                tbody.innerHTML += `<tr><td>${ex.no}</td><td>${ex.serial}</td><td>${ex.mark}</td></tr>`;
            });

            // Chart ရေးဆွဲခြင်း
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('performanceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: student.exams.map(ex => ex.serial),
                    datasets: [{
                        label: 'Marks',
                        data: student.exams.map(ex => ex.mark),
                        borderColor: '#0062ff',
                        backgroundColor: 'rgba(0, 98, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, max: 100 }
                    }
                }
            });
        }

        function showList() { switchScreen('list-screen'); }

        function switchScreen(id) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('list-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
