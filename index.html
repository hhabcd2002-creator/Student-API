<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance | Tech Blue</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #050a0f;
            --card: rgba(16, 28, 45, 0.95);
            --text: #e0f7fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #0a192f 0%, #050a0f 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 850px;
            text-align: center;
        }

        h2 { color: var(--primary); text-transform: uppercase; }

        input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            padding: 12px;
            color: white;
            border-radius: 8px;
            width: 200px;
            margin-bottom: 20px;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 5px;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 10px var(--primary);
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }

        th { color: var(--primary); }

        #login, #dashboard, #details { display: none; }
        #login { display: block; }

        canvas { margin-top: 25px; background: rgba(255,255,255,0.02); border-radius: 10px; }
    </style>
</head>
<body>

<div id="login" class="container">
    <h2>Access Control</h2>
    <input type="password" id="passInput" placeholder="Enter Password">
    <br>
    <button onclick="checkPass()">Login</button>
</div>

<div id="dashboard" class="container">
    <h2>Student Selection</h2>
    <div id="studentButtons"></div>
</div>

<div id="details" class="container">
    <h2 id="studentTitle">Statistics</h2>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Exam Serial</th>
                    <th>Name</th>
                    <th>Mark</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <canvas id="myChart"></canvas>
    <br>
    <button onclick="backToDash()">Back to Directory</button>
</div>

<script>
    let sheetData = [];
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSA3O0uIiboFpTTpEN-42J75cS7pNkalWt1enhCAH5ZH0M7sImhtfhSHphLBZ0lNY2jVb2oYHDfvySJ/pub?gid=0&single=true&output=csv';

    async function fetchData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').filter(row => row.trim() !== '');
            
            sheetData = rows.slice(1).map(row => {
                const cols = row.split(',');
                return {
                    no: cols[0]?.replace(/"/g, ''),
                    serial: cols[1]?.replace(/"/g, ''),
                    name: cols[2]?.replace(/"/g, ''),
                    mark: parseInt(cols[3]?.replace(/"/g, ''))
                };
            }).filter(s => s.name);
            setupButtons();
        } catch (e) {
            alert("Error loading data!");
        }
    }

    function checkPass() {
        if(document.getElementById('passInput').value.toLowerCase() === 'math') {
            document.getElementById('login').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            fetchData();
        } else {
            alert('Wrong Password!');
        }
    }

    function setupButtons() {
        const container = document.getElementById('studentButtons');
        const names = [...new Set(sheetData.map(s => s.name))];
        container.innerHTML = '';
        names.forEach(name => {
            const btn = document.createElement('button');
            btn.innerText = name;
            btn.onclick = () => showResults(name);
            container.appendChild(btn);
        });
    }

    let chart;
    function showResults(name) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('details').style.display = 'block';
        document.getElementById('studentTitle').innerText = name + "'s Analytics";

        const filtered = sheetData.filter(s => s.name === name);
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        filtered.forEach(s => {
            tbody.innerHTML += `<tr><td>${s.no}</td><td>${s.serial}</td><td>${s.name}</td><td>${s.mark}</td></tr>`;
        });

        const ctx = document.getElementById('myChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: filtered.map(s => s.serial),
                datasets: [{
                    label: 'Marks',
                    data: filtered.map(s => s.mark),
                    borderColor: '#00d4ff',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(0, 212, 255, 0.1)'
                }]
            },
            options: {
                scales: { y: { beginAtZero: true, grid: { color: '#222' } } }
            }
        });
    }

    function backToDash() {
        document.getElementById('details').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
    }
</script>
</body>
</html>
